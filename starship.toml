# Starship prompt configuration
# https://starship.rs/config/

# ── Prompt format ─────────────────────────────────────────────────────────────
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$package\
$bun\
$dotnet\
$golang\
$java\
$nodejs\
$python\
$rust\
$docker_context\
$aws\
$gcloud\
$kubernetes\
$terraform\
$cmd_duration\
$jobs\
$status\
$line_break\
$character"""

# ── Character ─────────────────────────────────────────────────────────────────
# Green $ on success, red $ on failure (mirrors current render_prompt)
[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"
vicmd_symbol = "[<](bold green)"

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# ── Git Branch ────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

# ── Git Commit ────────────────────────────────────────────────────────────────
[git_commit]
commit_hash_length = 7
tag_symbol = "tag "
style = "green"

# ── Git State ─────────────────────────────────────────────────────────────────
[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "bold yellow"

# ── Git Status ────────────────────────────────────────────────────────────────
[git_status]
conflicted = "!! "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = "✓"
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"
style = "red"
format = "([$all_status$ahead_behind]($style)) "

# ── Jobs ──────────────────────────────────────────────────────────────────────
# Mirrors current %(1j.%B%%%b .) — show job count when background jobs exist
[jobs]
symbol = "& "
number_threshold = 1
style = "bold blue"

# ── Status (exit code) ────────────────────────────────────────────────────────
# Mirrors current RPROMPT: shows [%?] on failure
[status]
symbol = "x"
style = "bold red"
format = "[$symbol$status]($style) "
disabled = false

# ── Command Duration ──────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
show_milliseconds = false
style = "yellow"

# ── Package ───────────────────────────────────────────────────────────────────
[package]
disabled = false
symbol = "pkg "

# ── Language Modules ──────────────────────────────────────────────────────────
# All use auto-detection — only show when relevant files are present

[bun]
symbol = "bun "
style = "bold #fbf0df"
format = "via [$symbol$version]($style) "

[dotnet]
symbol = ".NET "
style = "bold #512bd4"
format = "via [$symbol$version]($style) "

[golang]
symbol = "go "
style = "bold #00ADD8"
format = "via [$symbol$version]($style) "

[java]
symbol = "java "
style = "bold #ED8B00"
format = "via [$symbol$version]($style) "

[nodejs]
symbol = "node "
style = "bold #3C873A"
format = "via [$symbol$version]($style) "

[python]
symbol = "py "
style = "bold #3776AB"
format = "via [$symbol$version]($style) "

[rust]
symbol = "rs "
style = "bold #DEA584"
format = "via [$symbol$version]($style) "

# ── Cloud & Infrastructure ────────────────────────────────────────────────────

[aws]
symbol = "aws "
style = "bold #FF9900"
format = "[$symbol$profile]($style) "

[docker_context]
symbol = "docker "
style = "bold #2496ED"
format = "via [$symbol$context]($style) "

[gcloud]
symbol = "gcp "
style = "bold #4285F4"
format = "[$symbol$active]($style) "

[kubernetes]
symbol = "k8s "
style = "bold #326CE5"
format = "[$symbol$context]($style) "
disabled = false

[terraform]
symbol = "tf "
style = "bold #7B42BC"
format = "[$symbol$workspace]($style) "

# ── OS ────────────────────────────────────────────────────────────────────────
[os]
disabled = false
style = "bold white"

[os.symbols]
Macos = "mac "

# ── Username / Hostname (shown over SSH) ──────────────────────────────────────
[username]
show_always = false
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "bold dimmed green"
format = "at [$hostname]($style) "

# ── Line Break ────────────────────────────────────────────────────────────────
[line_break]
disabled = false