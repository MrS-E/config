# ---------- Appearance ----------
include themes/Cyberpunk Scarlet Protocol Adjusted.conf

font_family Menlo
font_size 13.0
cursor_shape block
cursor_blink_interval 0.5
copy_on_select yes

# ---------- Background / visuals ----------
background_opacity 0.98
dynamic_background_opacity yes
window_padding_width 4
inactive_text_alpha 0.85
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"

# ---------- Scrollback / scrolling ----------
scrollback_lines 200000
wheel_scroll_multiplier 4.0

# ---------- Behavior ----------
shell_integration enabled
# Use a widely available xterm terminfo instead of Kitty's default
# `xterm-kitty`, so remote SSH hosts, serial consoles, rescue shells,
# `vim`, `systemctl`, and other TUI tools work without installing Kitty
# terminfo everywhere.
term xterm-256color
enable_audio_bell no
confirm_os_window_close 1
editor nvim

# Keep Option as Alt on macOS so shell and editor shortcuts behave like Linux.
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_titlebar_color background

# ---------- Apple-classic keybindings ----------
# Tabs
map cmd+t new_tab
map cmd+w close_window

# Prev/Next tab: on Swiss keyboards “[” and “]” are usually Option+5/6.
map cmd+[ previous_tab
map cmd+] next_tab
map cmd+alt+5 previous_tab
map cmd+alt+6 next_tab

# Splits
map cmd+d launch --location=hsplit
# “\” is Option+Shift+7 on Swiss; bind BOTH.
map cmd+\ launch --location=vsplit
map cmd+shift+7 launch --location=vsplit

# Focus between splits (Cmd+Alt+Arrows)
map cmd+alt+left neighboring_window left
map cmd+alt+right neighboring_window right
map cmd+alt+up neighboring_window up
map cmd+alt+down neighboring_window down

# Fast movement in shells
# Option+Arrows: word-wise move (ESC b/f)
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf
# Cmd+Left/Right: start/end of line (Ctrl-A/E)
map cmd+left send_text all \x01
map cmd+right send_text all \x05
# Cmd+Up/Down: send PageUp/PageDown CSI (works in less/vim/nvim/tmux)
map cmd+up send_text all \x1b[5~
map cmd+down send_text all \x1b[6~

# Clipboard / app controls
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+k clear_terminal scrollback active
map cmd+enter toggle_fullscreen
map cmd+, edit_config_file
